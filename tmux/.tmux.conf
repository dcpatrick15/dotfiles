# QOL stuff
set -g mouse on
set -g @yank_action 'copy-pipe-no-clear'

# iterm2 style word/line copy
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-no-clear
bind -n MouseDown2Pane paste-buffer

bind -T root DoubleClick1Pane select-pane -t =\; copy-mode -H \; send-keys -X select-word \; send-keys -X copy-selection-no-clear
bind -T copy-mode DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-selection-no-clear

bind -T root TripleClick1Pane select-pane -t = \; copy-mode -H \; send-keys -X select-line \; send-keys -X copy-selection-no-clear
bind -T copy-mode TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X copy-selection-no-clear

# spacemacs/vim bindings
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
set -g display-panes-time 5000

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin '2kabhishek/tmux2k'
set -g @plugin 'alexwforsythe/tmux-which-key'

# theme
set -g @tmux2k-theme 'onedark'
set -g @tmux2k-icons-only true

run '~/.tmux/plugins/tpm/tpm'
